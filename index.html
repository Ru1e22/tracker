<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyzwanie $1 BI - Poker Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; max-width: 900px; margin: auto; }
        h1 { color: #f39c12; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; background-color: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .stat-box { font-size: 1.2em; }
        .stat-box strong { font-size: 1.5em; }
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        th, td { padding: 15px; border-bottom: 1px solid #333; text-align: center; }
        th { background-color: #2c3e50; color: white; text-transform: uppercase; font-size: 0.9em; }
        tr:hover { background-color: #2a2a2a; }
        .profit { color: #2ecc71; font-weight: bold; }
        .loss { color: #e74c3c; font-weight: bold; }
        .neutral { color: #95a5a6; }
    </style>
</head>
<body>

    <h1>🏆 Wyzwanie $1 BI by Szef</h1>
    
    <div class="stats">
        <div class="stat-box">Obecny Bankroll:<br> <strong id="bankroll">$0.00</strong></div>
        <div class="stat-box">Zysk / Strata:<br> <strong id="total-profit">$0.00</strong></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Turniej</th>
                <th>Wkład</th>
                <th>Wygrana</th>
                <th>Zysk Netto</th>
            </tr>
        </thead>
        <tbody id="tournaments-list">
            </tbody>
    </table>

    <script>
        // TUTAJ EDYTUJESZ DANE!
        const startBankroll = 102.76;
        
        // Aby dodać turniej, skopiuj jedną linijkę i zmień wartości
        const tournaments = [
            { date: "25.04", name: "Daily Deep Stacks $1", buyin: 1.00, win: 0.00 },
            { date: "25.04", name: "Daily Hyper $1", buyin: 1.00, win: 0.00 },
            { date: "25.04", name: "Bounty Hunters $1.08", buyin: 1.00, win: 3.50 }, // Przykładowa wygrana 3.50$ (zysk na zielono)
            { date: "25.04", name: "Bounty Hunters Special $3.20", buyin: 1.00, win: 0.00 }
        ];

        // Magia licząca to wszystko:
        let totalProfit = 0;
        const list = document.getElementById("tournaments-list");

        tournaments.forEach(t => {
            let profit = t.win - t.buyin;
            totalProfit += profit;
            
            let profitClass = profit > 0 ? "profit" : (profit < 0 ? "loss" : "neutral");
            
            list.innerHTML += `
                <tr>
                    <td>${t.date}</td>
                    <td style="text-align: left;">${t.name}</td>
                    <td>$${t.buyin.toFixed(2)}</td>
                    <td>$${t.win.toFixed(2)}</td>
                    <td class="${profitClass}">${profit > 0 ? '+' : ''}$${profit.toFixed(2)}</td>
                </tr>
            `;
        });

        document.getElementById("bankroll").innerText = "$" + (startBankroll + totalProfit).toFixed(2);
        
        let tpElement = document.getElementById("total-profit");
        tpElement.innerText = (totalProfit > 0 ? '+' : '') + "$" + totalProfit.toFixed(2);
        tpElement.className = totalProfit > 0 ? "profit" : (totalProfit < 0 ? "loss" : "neutral");
    </script>
</body>
</html>
